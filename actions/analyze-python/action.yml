name: 'IAM Policy Lens - Python Scanner'
description: 'Scans a Python project for Google Cloud API invocations and outputs discovered GAPIC calls.'
inputs:
  target-path:
    description: 'Path to the Python project to scan'
    required: false
    default: '.'
  python-environment:
    description: 'Optional path to target Python virtual environment for Jedi type resolution'
    required: false
    default: ''
  output-file:
    description: 'Path to save the raw GAPIC calls JSON'
    required: false
    default: 'gapic-calls.json'
outputs:
  results-file:
    description: 'Path to the raw GAPIC calls JSON file'
    value: ${{ inputs.output-file }}
runs:
  using: 'composite'
  steps:
    - name: Setup Python for Scanner
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Scanner Dependencies
      shell: bash
      run: pip install jedi
    - name: Run Python Scanner
      shell: bash
      run: |
        TARGET=$(realpath "${{ inputs.target-path }}")
        OUTPUT="$GITHUB_WORKSPACE/${{ inputs.output-file }}"
        ENV_PARAM=""
        if [ -n "${{ inputs.python-environment }}" ]; then
          ENV_PARAM=$(realpath "${{ inputs.python-environment }}")
        fi
        
        python3 ${{ github.action_path }}/../../iam-policy-lens/scripts/python/analyzer.py "$TARGET" $ENV_PARAM > "$OUTPUT"
    - name: Generate PR Annotations and Summary
      shell: bash
      run: python3 ${{ github.action_path }}/../reporter/annotator.py "$GITHUB_WORKSPACE/${{ inputs.output-file }}"
