name: 'IAM Policy Lens - Go Scanner'
description: 'Scans a Go project for Google Cloud API invocations and outputs discovered GAPIC calls.'
inputs:
  target-path:
    description: 'Path to the Go project to scan'
    required: false
    default: '.'
  output-file:
    description: 'Path to save the raw GAPIC calls JSON'
    required: false
    default: 'gapic-calls.json'
outputs:
  results-file:
    description: 'Path to the raw GAPIC calls JSON file'
    value: ${{ inputs.output-file }}
runs:
  using: 'composite'
  steps:
    - name: Setup Go for Scanner
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.21.0'

    - name: Run Go Scanner
      shell: bash
      run: |
        TARGET=$(realpath "${{ inputs.target-path }}")
        OUTPUT="$GITHUB_WORKSPACE/${{ inputs.output-file }}"
        
        (cd ${{ github.action_path }}/../../iam-policy-lens/scripts/go && go run *.go "$TARGET") > "$OUTPUT"

